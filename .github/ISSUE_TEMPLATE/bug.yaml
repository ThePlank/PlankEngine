name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - ThePlank
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      options:
        - 0.5 (Prerelease)
    validations:
      required: true
  - type: dropdown
    id: browsers
    attributes:
      label: If you are playing on HTML5, on what browsers did you experience these issues on?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
  - type: dropdown
    id: browsers
    attributes:
      label: What modcharting system did you use?
      multiple: true
      options:
        - Lua
        - HScript
        - Source
        - None
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: input
  id: modified-files
  attributes:
      label: If any, what files did you modify and in what way?
